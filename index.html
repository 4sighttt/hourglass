<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="scene">
    <div class="title-wrap">
      <h1>Hourglass</h1>
      <p>HTML + CSS animated hourglass</p>
    </div>

    <section class="hourglass-wrap" aria-label="애니메이션 모래시계">
      <div class="hourglass">
        <div class="frame top"></div>
        <div class="frame bottom"></div>

        <div class="glass top-glass">
          <div class="sand sand-top"></div>
        </div>

        <div class="glass bottom-glass">
          <div class="sand sand-bottom"></div>
        </div>

        <div class="neck"></div>
        <div class="stream"></div>
      </div>
    </section>
  </main>
</body>
</html>
