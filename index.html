<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="eyebrow">Visual Timer</div>
      <h1>Hourglass Timer</h1>
      <p>시간이 끝나면 자동으로 뒤집히지 않고 그대로 멈춥니다.</p>
    </section>

    <section class="controls" aria-label="타이머 선택">
      <div class="button-grid">
        <button class="time-btn" data-minutes="1">1분</button>
        <button class="time-btn" data-minutes="3">3분</button>
        <button class="time-btn" data-minutes="5">5분</button>
        <button class="time-btn" data-minutes="10">10분</button>
        <button class="time-btn" data-minutes="15">15분</button>
        <button class="time-btn" data-minutes="30">30분</button>
      </div>

      <div class="status">
        <div class="status-line">선택된 시간 <strong id="selectedLabel">없음</strong></div>
        <div class="status-line">남은 시간 <strong id="countdown">00:00</strong></div>
      </div>
    </section>

    <section class="viewer" aria-label="모래시계 영역">
      <div class="hourglass-wrap">
        <svg class="hourglass-svg" viewBox="0 0 260 420" aria-hidden="true">
          <defs>
            <linearGradient id="glassFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
            </linearGradient>

            <linearGradient id="sandFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#f8e2b2"/>
              <stop offset="55%" stop-color="#e2b86b"/>
              <stop offset="100%" stop-color="#c88e35"/>
            </linearGradient>

            <linearGradient id="sandHighlight" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
              <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
            </linearGradient>

            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="5" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>

            <clipPath id="topClip">
              <path d="M52 60 L208 60 C196 117 167 154 138 186 L122 186 C93 154 64 117 52 60 Z"></path>
            </clipPath>

            <clipPath id="bottomClip">
              <path d="M122 234 L138 234 C167 266 196 303 208 360 L52 360 C64 303 93 266 122 234 Z"></path>
            </clipPath>
          </defs>

          <g class="frame">
            <rect x="34" y="18" width="192" height="18" rx="9" fill="#6b4c29"></rect>
            <rect x="34" y="384" width="192" height="18" rx="9" fill="#4e361d"></rect>
            <rect x="48" y="28" width="10" height="364" rx="5" fill="#755633"></rect>
            <rect x="202" y="28" width="10" height="364" rx="5" fill="#5b3f22"></rect>
          </g>

          <g class="glass">
            <path class="glass-body" d="M52 60 L208 60 C196 117 167 154 138 186 L122 186 C93 154 64 117 52 60 Z"></path>
            <path class="glass-body" d="M122 234 L138 234 C167 266 196 303 208 360 L52 360 C64 303 93 266 122 234 Z"></path>
            <rect class="neck" x="121" y="186" width="18" height="48" rx="9"></rect>
            <path class="glass-rim" d="M52 60 L208 60"></path>
            <path class="glass-rim" d="M52 360 L208 360"></path>
            <path class="glass-shine" d="M82 79 C74 110 91 146 109 167"></path>
            <path class="glass-shine" d="M177 277 C186 305 179 331 167 350"></path>
            <path class="glass-inner-shine" d="M171 78 C180 106 164 146 147 170"></path>
          </g>

          <g clip-path="url(#topClip)">
            <path id="topSand" class="sand-mass" fill="url(#sandFill)"></path>
            <path id="topSandHighlight" class="sand-highlight" fill="url(#sandHighlight)"></path>
          </g>

          <g id="streamGroup" filter="url(#softGlow)">
            <path id="sandStream" fill="url(#sandFill)"></path>
            <circle id="streamSpark" cx="130" cy="232" r="4" fill="#f6ddb0" opacity="0"></circle>
          </g>

          <g clip-path="url(#bottomClip)">
            <path id="bottomSand" class="sand-mass" fill="url(#sandFill)"></path>
            <path id="bottomSandHighlight" class="sand-highlight" fill="url(#sandHighlight)"></path>
          </g>
        </svg>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
