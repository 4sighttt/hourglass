<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <p class="eyebrow">Visual Timer</p>
      <h1>Hourglass Timer</h1>
      <p class="subtitle">시간이 끝나면 자동으로 뒤집히지 않고 그대로 멈춥니다.</p>
    </header>

    <section class="control-panel" aria-label="타이머 선택 영역">
      <div class="button-grid" role="group" aria-label="타이머 분 선택">
        <button class="time-btn" data-minutes="1">1분</button>
        <button class="time-btn" data-minutes="3">3분</button>
        <button class="time-btn" data-minutes="5">5분</button>
        <button class="time-btn" data-minutes="10">10분</button>
        <button class="time-btn" data-minutes="15">15분</button>
        <button class="time-btn" data-minutes="30">30분</button>
      </div>

      <div class="status-panel">
        <div class="status-card">
          <span class="status-label">선택된 시간</span>
          <strong id="selectedLabel">없음</strong>
        </div>
        <div class="status-card status-card--time">
          <span class="status-label">남은 시간</span>
          <strong id="countdown">00:00</strong>
        </div>
      </div>
    </section>

    <section class="viewer" aria-label="모래시계 영역">
      <div class="pedestal"></div>

      <div class="hourglass-shell">
        <div class="cap cap-top"></div>
        <div class="cap cap-bottom"></div>
        <div class="pillar pillar-left"></div>
        <div class="pillar pillar-right"></div>

        <div class="glass glass-top">
          <div class="glass-highlight glass-highlight-top"></div>
          <div class="sand top-sand" id="sandTop"></div>
        </div>

        <div class="glass-neck">
          <div class="neck-glow"></div>
          <div class="sand-stream" id="stream"></div>
        </div>

        <div class="glass glass-bottom">
          <div class="glass-highlight glass-highlight-bottom"></div>
          <div class="sand bottom-sand" id="sandBottom"></div>
          <div class="sand-pile" id="sandPile"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
