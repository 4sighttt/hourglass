<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hud" aria-label="타이머 상태">
      <div class="button-grid">
        <button class="time-btn" data-minutes="1">1분</button>
        <button class="time-btn" data-minutes="3">3분</button>
        <button class="time-btn" data-minutes="5">5분</button>
        <button class="time-btn" data-minutes="10">10분</button>
        <button class="time-btn" data-minutes="15">15분</button>
        <button class="time-btn" data-minutes="30">30분</button>
      </div>

      <div class="status">
        <div class="status-line">선택된 시간 <strong id="selectedLabel">없음</strong></div>
        <div class="status-line">남은 시간 <strong id="countdown">00:00</strong></div>
      </div>
    </section>

    <section class="viewer" aria-label="모래시계 영역">
      <div class="hourglass-wrap">
        <svg class="hourglass-svg" viewBox="0 0 300 430" aria-hidden="true">
          <defs>
            <linearGradient id="sandFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#efd38b"/>
              <stop offset="100%" stop-color="#d8a44b"/>
            </linearGradient>
            <linearGradient id="glassTint" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="rgba(220,240,255,0.08)"/>
              <stop offset="100%" stop-color="rgba(220,240,255,0.03)"/>
            </linearGradient>
            <clipPath id="topClip">
              <path d="M74 74 L226 74 Q216 122 177 175 L123 175 Q84 122 74 74 Z"></path>
            </clipPath>
            <clipPath id="bottomClip">
              <path d="M123 255 L177 255 Q216 308 226 356 L74 356 Q84 308 123 255 Z"></path>
            </clipPath>
          </defs>

          <g class="frame">
            <rect x="52" y="24" width="196" height="20" rx="10"></rect>
            <rect x="52" y="386" width="196" height="20" rx="10"></rect>
            <rect x="66" y="34" width="12" height="362" rx="6"></rect>
            <rect x="222" y="34" width="12" height="362" rx="6"></rect>
          </g>

          <g class="glass-body">
            <path class="glass-outline" d="M74 74 L226 74 Q216 122 177 175 L123 175 Q84 122 74 74 Z"></path>
            <path class="glass-outline" d="M123 255 L177 255 Q216 308 226 356 L74 356 Q84 308 123 255 Z"></path>
            <rect class="neck" x="132" y="175" width="36" height="80" rx="14"></rect>
            <path class="glass-shine" d="M102 92 C96 118 104 143 122 168"></path>
            <path class="glass-shine" d="M190 286 C198 308 193 332 178 345"></path>
          </g>

          <g clip-path="url(#topClip)">
            <path id="topSand" fill="url(#sandFill)"></path>
          </g>

          <g clip-path="url(#bottomClip)">
            <path id="bottomSand" fill="url(#sandFill)"></path>
          </g>

          <path id="sandStream" fill="url(#sandFill)"></path>
        </svg>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
